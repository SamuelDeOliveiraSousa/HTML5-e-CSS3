<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>

    
    <H1>Imagem dinamica</H1>
    <p>Tente abrir esse site em varios dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador.</p>

    <picture>
         <source media="(max-width: 750px)" srcset="Imagens/img.pequena.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="Imagens/img.media.png" type="image/png">
        <img src="Imagens/img.grande.png" alt="Imagem flexivel">

    </picture>

    <h1>Reproduzindo audio</h1>
    <p>Vamos aprender a reproduzir audio no HTML5</p>
    <audio src="midia/Wildfire - Jessie Villa.mp3" controls autoplay loop></audio>


    <p>Se voce quiser baixar está musica, toma bala, <a href="midia/Wildfire - Jessie Villa.mp3">clique aqui</a>.</p>


</body>
</html>
